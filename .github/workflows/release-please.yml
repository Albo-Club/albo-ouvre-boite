name: Release please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      # Run the action on Node 24 (newer undici). Node 20's keep-alive socket
      # reuse throws `other side closed` against the GitHub API, which failed
      # every release-please run. Also clears the Node 20 deprecation warning.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Default token has enough scope for releases on public/private repos
          # where Actions has write permissions.
