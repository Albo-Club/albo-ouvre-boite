name: Sync skills

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run sync:skills
      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-skills
          base: main
          commit-message: 'chore: sync skills from upstream'
          title: 'chore: sync skills from upstream'
          body: |
            Automated `pnpm run sync:skills` run. Review the diff before merging.
          labels: skills
          delete-branch: true
